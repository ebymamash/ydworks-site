<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YD Works</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --text: #eeece8;
    --muted: #7a7875;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: sans-serif;
    min-height: 100vh;
  }
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    z-index: 10;
  }
  .hero {
    width: 100%;
    height: 100vh;
    position: relative;
  }
  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.6;
    filter: contrast(1.1) grayscale(0.3);
  }
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.2) 0px,
      rgba(0,0,0,0.2) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }
</style>
</head>
<body>
<nav>
  <a href="#"><img src="logo.svg" width="80" height="80"></a>
</nav>
<div class="hero">
  <img src="hero.jpg" class="hero-img">
</div>
</body>
</html>
