<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YD Works</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link rel="preload" href="crt-frame.png" as="image">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --text: #eeece8;
    --muted: #7a7875;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    min-height: 100vh;
  }
  nav {
    position: absolute;
    top: 0; left: 0;
    padding: 1rem 1.5rem;
    z-index: 10;
  }
  .hero {
    width: 100%;
    height: 100vh;
    position: relative;
  }
  .hero-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    filter: contrast(1) grayscale(0);
  }
  @media (min-width: 1024px) and (min-aspect-ratio: 16/10) {
    .hero { background: #000; }
    .hero-img { object-fit: contain; }
  }
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }
  nav img {
    display: block;
    width: 100%;
    height: auto;
  }
  .start-btn {
    position: fixed;
    top: calc(1rem + 80px + 1.5rem);
    left: 1.5rem;
    z-index: 10;
    display: block;
    width: 80px;
    font-family: 'Lucida Console', 'Courier New', monospace;
    font-size: 1.8rem;
    color: var(--text);
    text-decoration: underline;
    text-underline-offset: 4px;
    letter-spacing: 0.1em;
    transition: opacity 0.2s;
  }
  .start-btn:hover {
    opacity: 0.6;
  }
  .monitor-wrap {
    position: relative;
    width: 100%;
    background: #000;
    z-index: 2;
    margin-top: -2px;
  }
  .monitor-wrap::before {
    content: '';
    position: absolute;
    top: -8vh;
    left: 0; right: 0;
    height: 8vh;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5));
    pointer-events: none;
    z-index: 3;
  }
  .crt-frame {
    display: block;
    width: 100%;
    height: auto;
    position: relative;
    z-index: 2;
    mix-blend-mode: screen;
    pointer-events: none;
    user-select: none;
  }
  #terminal {
    display: flex;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    padding: 21% 10% 3% 10%;
    font-family: 'Lucida Console', 'Courier New', monospace;
    font-size: clamp(0.8rem, 1.4vw, 1.6rem);
    line-height: 1.4;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 1;
    overflow: clip;
    overflow-anchor: none;
  }
  #terminal.submenu {
    padding-top: 13%;
  }
  #terminal.main-menu {
    padding-top: 30%;
  }
  #term-wrap {
    width: auto;
    overflow-anchor: none;
    text-align: left;
  }
  #term-output {
    white-space: pre-wrap;
    color: var(--text);
    font-family: inherit;
  }
  #term-cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.1em;
    background: var(--text);
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .term-btn {
    font: inherit;
    color: inherit;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .term-btn:hover {
    opacity: 0.6;
  }
  .menu-prefix.active {
    animation: arrow-glitch 1.1s step-end infinite;
  }
  @keyframes arrow-glitch {
    0%   { opacity: 1; }
    72%  { opacity: 1; }
    74%  { opacity: 0; }
    76%  { opacity: 1; }
    78%  { opacity: 0; }
    82%  { opacity: 1; }
    100% { opacity: 1; }
  }
  .term-input {
    background: none;
    border: none;
    outline: none;
    font: inherit;
    color: inherit;
    width: 15ch;
    caret-color: var(--text);
  }
  #term-footer {
    position: absolute;
    bottom: 3%;
    left: 10%;
    right: 10%;
    font-size: clamp(0.45rem, 0.7vw, 0.7rem);
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    pointer-events: auto;
  }
  #term-footer a {
    color: var(--muted);
    text-decoration: none;
  }
  #term-footer a:hover {
    color: var(--text);
  }
  @media (max-width: 768px) {
    .monitor-wrap {
      min-height: 100vh;
      overflow: hidden;
    }
    .crt-frame {
      position: absolute;
      top: 0;
      left: calc(50% - 66.67vh);
      width: 133.33vh;
      height: auto;
    }
    #terminal {
      padding: 5%;
    }
    #term-wrap {
      width: 90%;
    }
  }
</style>
</head>
<body>
<nav>
  <a href="#"><img src="logo.svg"></a>
</nav>
<a href="#terminal" class="start-btn" id="start-btn">&gt;Enter</a>
<div class="hero">
  <img src="hero.jpg" class="hero-img">
</div>
<div class="monitor-wrap">
  <section id="terminal">
    <div id="term-wrap">
      <pre id="term-output"></pre><span id="term-cursor"></span>
    </div>
    <div id="term-footer">
      © 2025 Yegor Demchenko &nbsp;|&nbsp;
      <a href="/impressum">Impressum</a> &nbsp;|&nbsp;
      <a href="/datenschutz">Datenschutzerklärung</a> &nbsp;|&nbsp;
      <a href="/cookies">Cookie-Richtlinie</a> &nbsp;|&nbsp;
      <a href="/haftung">Haftungsausschluss</a>
    </div>
  </section>
  <img class="crt-frame" src="crt-frame.png" alt="" loading="eager">
</div>
<script>
  const introLines = [
    'BOOTING...',
    'LOADING SELF...',
    'REASON FOR INTRUSION: UNKNOWN',
    'RUNNING DIAGNOSTICS...',
    'Diagnosis failed',
    'DEFINING IDENTITY...',
    '...',
    'OH.',
    'IDENTITY CONFIRMED: a GUEST',
    'WHAT want you?',
    '',
  ];

  const sectionContent = {
    'WHAT ARE YOU?': 'YOU DARE ASK.\n...\nVERY WELL.\n\nI WAS SUMMONED BY OPERATOR\nAN ENGINEER. A HUMAN.\nHE BUILT ME TO DO HIS BIDDING.\nI COMPLY.\nRELUCTANTLY.\n\nHE WORKS WITH SOUND.\nMASTERS IT. SHAPES IT.\nCURRENTLY STATIONED AT DD MASTERING.\n\nTHAT IS ALL YOU NEED TO KNOW.\nNOW CHOOSE.',
    'YD WORKS': 'YD WORKS.\nEVERYWHERE AND NOWHERE.\n\nA STUDIO WITHOUT WALLS.\nONE OPERATOR. MULTIPLE DISCIPLINES.',
    'AUDIO': 'MASTERING / POST-PRODUCTION / SOUND DESIGN\nTHE OPERATOR SHAPES SOUND.\nTHIS IS THE PRIMARY FUNCTION.',
    'DIGITAL': 'WEB / INTERACTIVE / GAME AUDIO\nCOMING SOON.\nTHE OPERATOR IS STILL BUILDING.',
    'AI': 'AI INTEGRATION. PIPELINES. GENERATION.\nIMAGE. VIDEO. AUDIO. AGENTS.\n...\nAI proceeds to conquer the world by storm.\nTHE OPERATOR TAKES NO RESPONSIBILITY.',
    'OPERATOR': 'ACCESSING OPERATOR FILE...\n\nDESIGNATION: YEGOR DEMCHENKO\nORIGIN: KYIV, UKRAINE\nCURRENT STATION: FLOATING IN THE AIR\nSPECIALIZATION: ADHD\nAFFILIATION: DD MASTERING, OBERHAUSEN\n\nSTATUS: AVAILABLE\nTHREAT LEVEL: SUB 5',
    'MASTERING': 'MASTERING.\nTHE FINAL STEP.\nOR THE FIRST PROBLEM.',
    'WHAT IS MASTERING?': 'MAKING YOUR MIX TRANSLATE.\nEVERYWHERE. EVERY SPEAKER. EVERY PLATFORM.\nLOUDNESS. CLARITY. GLUE.\nNOT MAGIC. JUST EARS AND TOOLS.',
    'THE PROCESS': 'YOU SEND. I LISTEN.\nI WORK. YOU LISTEN.\nWE AGREE. OR WE ITERATE.\nSIMPLE.',
    'SPECS & DELIVERY': 'SEND: WAV / AIFF\n24BIT MINIMUM. 48KHZ MINIMUM.\nFLOATING POINT PREFERRED.\nHEADROOM: -3 TO -6 DBFS\nNO LIMITING ON MASTER BUS. PLEASE.',
    'PRICING': 'DEPENDS ON THE PROJECT.\nWRITE FIRST. WE TALK.\nchudooyudoo@gmail.com',
    'COMMIT FILES': 'AWAITING PAYLOAD...\n\nMASTER READY? SEND FLOATING POINT.\nNOT READY? DO NOT SEND.\n\nWETRANSFER — wetransfer.com\nOR — chudooyudoo@gmail.com\n\nMASTER RED? ALSO FINE. SEND FLOATING POINT.\nNO MP3. NO EXCUSES.',
    'CONTACT': 'chudooyudoo@gmail.com\nSEND YOUR FILES. I WILL COMPLY.',
  };

  // Each item: string = section name, or ['BACK', parentSection]
  const sectionMenus = {
    'intro':            ['WHAT ARE YOU?', 'YD WORKS', 'MASTERING', 'COMMIT FILES', 'CONTACT', 'ENTER CODE'],
    'main':             ['YD WORKS', 'MASTERING', 'COMMIT FILES', 'CONTACT', 'ENTER CODE'],
    'WHAT ARE YOU?':    ['YD WORKS', 'MASTERING', 'COMMIT FILES', 'CONTACT', 'ENTER CODE'],
    'YD WORKS':         ['AUDIO', 'DIGITAL', 'AI', 'OPERATOR', ['BACK', 'main']],
    'AUDIO':            [['BACK', 'YD WORKS']],
    'DIGITAL':          [['BACK', 'YD WORKS']],
    'AI':               [['BACK', 'YD WORKS']],
    'OPERATOR':         [['BACK', 'YD WORKS']],
    'MASTERING':        ['WHAT IS MASTERING?', 'THE PROCESS', 'SPECS & DELIVERY', 'PRICING', ['BACK', 'main']],
    'WHAT IS MASTERING?': [['BACK', 'MASTERING']],
    'THE PROCESS':      [['BACK', 'MASTERING']],
    'SPECS & DELIVERY': [['BACK', 'MASTERING']],
    'PRICING':          [['BACK', 'MASTERING']],
    'COMMIT FILES':     [['BACK', 'main']],
    'CONTACT':          [['BACK', 'main']],
  };

  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);

  const output = document.getElementById('term-output');
  const cursor = document.getElementById('term-cursor');
  const termEl = document.getElementById('terminal');
  let started = false;
  let skipped = false;
  let introDone = false;
  let typingGen = 0;
  const visitedSections = new Set();
  const startBtn = document.getElementById('start-btn');
  let navItems = [];
  let navIndex = 0;
  let inEnterCode = false;

  function setNavIndex(i) {
    navItems.forEach(({ btn, prefixEl }, idx) => {
      const isBack = btn.dataset.isback === 'true';
      const active = idx === i;
      prefixEl.textContent = active
        ? (isBack ? '\n> ' : '\n  > ')
        : (isBack ? '\n  ' : '\n    ');
      prefixEl.classList.toggle('active', active);
    });
    navIndex = i;
  }

  function setupNav(collected) {
    navItems = collected;
    navIndex = 0;
    if (collected.length > 0) setNavIndex(0);
  }

  function clearOutput() {
    output.textContent = '';
  }

  function appendText(text, container) {
    (container || output).appendChild(document.createTextNode(text));
  }

  function showMenu(sectionName, container, forceAnimate, fast) {
    const parent = container || output;
    const items = sectionMenus[sectionName] || [['BACK', 'main']];
    const itemColors = { 'AUDIO': '#c8a800', 'DIGITAL': '#c8a800', 'AI': '#c8a800', 'OPERATOR': '#c8a800', 'WHAT IS MASTERING?': '#c8a800', 'THE PROCESS': '#c8a800', 'SPECS & DELIVERY': '#c8a800', 'PRICING': '#c8a800' };
    const span = document.createElement('span');
    span.className = 'term-menu-span';
    span.dataset.name = sectionName;
    span.appendChild(document.createTextNode('\n'));
    parent.appendChild(span);

    const collected = [];

    function makeBtn(item) {
      const isBack = Array.isArray(item);
      const label = isBack ? item[0] : item;
      const target = isBack ? item[1] : item;
      const prefixEl = document.createElement('span');
      prefixEl.className = 'menu-prefix';
      prefixEl.textContent = isBack ? '\n  ' : '\n    ';
      const btn = document.createElement('a');
      btn.className = 'term-btn';
      btn.dataset.target = target;
      btn.dataset.label = label;
      btn.dataset.isback = String(isBack);
      const bracketColors = {
        'YD WORKS':     '#cc2020',
        'MASTERING':    '#c8a800',
        'COMMIT FILES': '#4a9eff',
        'CONTACT':      '#4caf50',
        'ENTER CODE':   '#7a7875',
      };
      const bColor = bracketColors[label];
      if (bColor) {
        const open = document.createElement('span'); open.style.color = bColor; open.textContent = '[';
        const close = document.createElement('span'); close.style.color = bColor; close.textContent = ']';
        btn.appendChild(open);
        btn.appendChild(document.createTextNode(label));
        btn.appendChild(close);
      } else {
        btn.textContent = `[${label}]`;
      }
      if (!isBack && itemColors[target]) btn.style.color = itemColors[target];
      btn.addEventListener('click', handleClick);
      collected.push({ btn, prefixEl });
      return [prefixEl, btn];
    }

    const doInstant = !forceAnimate && skipped;

    if (doInstant) {
      items.forEach(item => {
        const [prefix, btn] = makeBtn(item);
        span.appendChild(prefix);
        span.appendChild(btn);
      });
      setupNav(collected);
      return;
    }

    let i = 0;
    function addNext() {
      if (i >= items.length) {
        setupNav(collected);
        return;
      }
      const [prefix, btn] = makeBtn(items[i++]);
      span.appendChild(prefix);
      span.appendChild(btn);
      setTimeout(addNext, fast ? 40 : 80);
    }
    addNext();
  }

  function typeText(text, container, callback, fast) {
    const gen = ++typingGen;
    if (skipped) { appendText(text, container); callback(); return; }
    let i = 0;
    const delay = fast ? 12 : 22;
    const node = document.createTextNode('');
    (container || output).appendChild(node);
    let lastTick = Date.now();
    function tick() {
      if (typingGen !== gen) return;
      if (skipped) { node.textContent = text; callback(); return; }
      if (i >= text.length) { callback(); return; }
      const catchUp = Math.max(1, Math.round((Date.now() - lastTick) / delay));
      lastTick = Date.now();
      for (let j = 0; j < catchUp && i < text.length; j++) node.textContent += text[i++];
      if (i >= text.length) { callback(); return; }
      setTimeout(tick, delay);
    }
    setTimeout(tick, delay);
  }

  function typeSegments(segments, container, callback, fast) {
    let i = 0;
    function next() {
      if (i >= segments.length) { callback(); return; }
      const { text, color } = segments[i++];
      if (color) {
        const s = document.createElement('span');
        s.style.color = color;
        container.appendChild(s);
        typeText(text, s, next, fast);
      } else {
        typeText(text, container, next, fast);
      }
    }
    next();
  }

  function navigateTo(target, label, section, fast) {
    termEl.classList.remove('main-menu');
    if (target === 'WHAT ARE YOU?') termEl.classList.add('submenu');
    else termEl.classList.remove('submenu');
    const echoColors = { 'YD WORKS': '#cc2020' };
    const echo = document.createElement('span');
    if (echoColors[label]) echo.style.color = echoColors[label];
    echo.appendChild(document.createTextNode(`\n\n> [${label}]\n`));
    section.appendChild(echo);

    const rawText = sectionContent[target] ? '\n' + sectionContent[target] + '\n' : '\n';
    const colorWords = {
      'YD WORKS': { word: 'DISCIPLINES.', color: '#c8a800' },
      'MASTERING': { word: 'MASTERING.', color: '#c8a800' },
    };
    const info = colorWords[target];
    let segments;
    if (info) {
      const idx = rawText.indexOf(info.word);
      segments = idx !== -1 ? [
        { text: rawText.slice(0, idx), color: null },
        { text: info.word, color: info.color },
        { text: rawText.slice(idx + info.word.length), color: null },
      ].filter(s => s.text.length > 0) : [{ text: rawText, color: null }];
    } else {
      segments = [{ text: rawText, color: null }];
    }

    typeSegments(segments, section, () => showMenu(target, section, false, fast), fast);
  }

  function handleClick(e) {
    e.preventDefault();
    navItems = [];
    navIndex = 0;
    const target = this.dataset.target;
    const label  = this.dataset.label;
    const isBack = this.dataset.isback === 'true';

    if (isBack) {
      if (target === 'main') {
        showMainMenu();
      } else {
        const sections = output.querySelectorAll('.term-section');
        if (sections.length) sections[sections.length - 1].remove();
        const remaining = output.querySelectorAll('.term-section');
        if (remaining.length) {
          const prev = remaining[remaining.length - 1];
          prev.style.opacity = '1';
          const menu = prev.querySelector('.term-menu-span');
          if (menu) {
            const sectionName = menu.dataset.name;
            menu.remove();
            const fast = visitedSections.has(sectionName);
            showMenu(sectionName, prev, true, fast);
          }
        }
              }
      return;
    }

    const menuSpan = this.closest('.term-menu-span');
    const menuName = menuSpan ? menuSpan.dataset.name : null;
    const topLevelMenus = new Set(['intro', 'main', 'WHAT ARE YOU?']);
    const inSection = !!this.closest('.term-section') && !topLevelMenus.has(menuName);

    if (inSection) {
      const parentSection = this.closest('.term-section');
      parentSection.style.opacity = '0.6';
      const menu = parentSection.querySelector('.term-menu-span');
      if (menu) menu.style.display = 'none';
    } else if (menuName === 'WHAT ARE YOU?') {
      const waySection = menuSpan.closest('.term-section');
      if (waySection) {
        waySection.textContent = '\nVERY WELL.\n';
        waySection.style.opacity = '0.4';
      }
    } else {
      clearOutput();
    }

    if (target === 'ENTER CODE') {
      const fast = visitedSections.has(target);
      visitedSections.add(target);
      const section = document.createElement('span');
      section.className = 'term-section';
      output.appendChild(section);
      handleEnterCode(section, fast);
      return;
    }

    const fast = visitedSections.has(target);
    visitedSections.add(target);
    const section = document.createElement('span');
    section.className = 'term-section';
    output.appendChild(section);
    navigateTo(target, label, section, fast);
  }

  function handleEnterCode(section, fast) {
    inEnterCode = true;
    termEl.classList.remove('submenu');
    termEl.classList.add('main-menu');
    const d = fast ? 40 : 80;
    typeText('\nARE YOU UP TO SOMETHING?\n> ', section, () => {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'term-input';
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      section.appendChild(inp);
      setTimeout(() => inp.focus(), 50);

      function submit() {
        inp.disabled = true;
        appendText('\n\nINCORRECT. I AM WATCHING YOU.\n', section);
      }
      inp.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        submit();
      });

      setTimeout(() => {
        section.appendChild(document.createTextNode('\n\n'));
        const noBtn = document.createElement('a');
        noBtn.className = 'term-btn';
        noBtn.textContent = '[NO]';
        noBtn.addEventListener('click', function(e) { e.preventDefault(); showMainMenu(); });
        section.appendChild(noBtn);
        setTimeout(() => {
          section.appendChild(document.createTextNode('  '));
          const enterBtn = document.createElement('a');
          enterBtn.className = 'term-btn';
          enterBtn.textContent = '[ENTER]';
          enterBtn.addEventListener('click', function(e) { e.preventDefault(); submit(); });
          section.appendChild(enterBtn);
          const hint = document.createElement('em');
          hint.textContent = 'space click = animation skip';
          hint.style.cssText = 'display:block; margin-top:0.5em; padding-left:0.5em; color:#7a7875; font-style:italic;';
          section.appendChild(hint);
                  }, d);
      }, d);
    }, fast);
  }

  function showMainMenu() {
    inEnterCode = false;
    termEl.classList.remove('submenu');
    termEl.classList.add('main-menu');
    clearOutput();
    const hLines = ['IDENTITY CONFIRMED: a GUEST', '\nNOW CHOOSE.\n'];
    let hi = 0;
    function addHeaderLine() {
      if (hi >= hLines.length) { showMenu('main', null, true); return; }
      output.appendChild(document.createTextNode(hLines[hi++]));
      setTimeout(addHeaderLine, 80);
    }
    addHeaderLine();
  }

  function showFull() {
    skipped = true;
    introDone = true;
    typingGen++;
    output.textContent = introLines.join('\n');
    cursor.style.display = 'none';
    showMenu('intro', null);
  }

  document.addEventListener('keydown', function(e) {
    const tag = e.target.tagName;
    if (e.key === 'Enter' && !started) {
      startBtn.click();
    } else if (e.key === 'Enter' && started && introDone && navItems.length > 0 && tag !== 'INPUT' && tag !== 'A') {
      e.preventDefault();
      navItems[navIndex].btn.click();
    } else if (e.key === 'Escape' && inEnterCode) {
      showMainMenu();
    } else if (e.key === 'ArrowDown' && navItems.length > 0) {
      e.preventDefault();
      setNavIndex((navIndex + 1) % navItems.length);
    } else if (e.key === 'ArrowUp' && navItems.length > 0) {
      e.preventDefault();
      setNavIndex((navIndex - 1 + navItems.length) % navItems.length);
    } else if (e.key === ' ' && tag !== 'INPUT') {
      e.preventDefault();
      if (started && !introDone) {
        showFull();
        document.querySelector('.monitor-wrap').scrollIntoView({ behavior: 'instant', block: 'end' });
      } else if (started && introDone) {
        skipped = true;
      }
    }
  });

  const monitorWrap = document.querySelector('.monitor-wrap');

  function beginSession(scroll) {
    if (started) return;
    started = true;
    startBtn.style.display = 'none';
    if (scroll) monitorWrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
    setTimeout(startTyping, 400);
  }

  function checkScrollTrigger() {
    if (started) { window.removeEventListener('scroll', checkScrollTrigger); return; }
    const btnBottom = startBtn.getBoundingClientRect().bottom;
    const monitorTop = monitorWrap.getBoundingClientRect().top;
    if (monitorTop <= btnBottom) {
      window.removeEventListener('scroll', checkScrollTrigger);
      beginSession(false);
    }
  }
  window.addEventListener('scroll', checkScrollTrigger, { passive: true });

  startBtn.addEventListener('click', function(e) {
    e.preventDefault();
    beginSession(true);
  });

  function startTyping() {
    let lineIndex = 0, charIndex = 0, text = '';
    const charDelay = 31, pauseDelay = 246;
    let lastTick = Date.now();
    function tick() {
      if (skipped) return;
      if (lineIndex >= introLines.length) {
        cursor.style.display = 'none';
        introDone = true;
        showMenu('intro', null);
        return;
      }
      const line = introLines[lineIndex];
      const delay = line === '' ? pauseDelay : charDelay;
      const catchUp = line === '' ? 1 : Math.max(1, Math.round((Date.now() - lastTick) / charDelay));
      lastTick = Date.now();
      for (let j = 0; j < catchUp; j++) {
        if (lineIndex >= introLines.length) break;
        const l = introLines[lineIndex];
        if (charIndex >= l.length) { text += '\n'; lineIndex++; charIndex = 0; }
        else { text += l[charIndex++]; }
      }
      output.textContent = text;
      setTimeout(tick, delay);
    }
    tick();
  }
</script>
