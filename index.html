<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YD Works</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --text: #eeece8;
    --muted: #7a7875;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    min-height: 100vh;
  }
  nav {
    position: fixed;
    top: 0; left: 0;
    padding: 1rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0.5rem;
    z-index: 10;
  }
  .hero {
    width: 100%;
    height: 100vh;
    position: relative;
  }
  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    filter: contrast(1) grayscale(0);
  }
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }
  nav img {
    display: block;
    width: 100%;
    height: auto;
  }
  .start-btn {
    display: block;
    font-family: 'Lucida Console', 'Courier New', monospace;
    font-size: 2.8rem;
    color: var(--text);
    text-decoration: none;
    text-decoration: underline;
    text-underline-offset: 4px;
    letter-spacing: 0.1em;
    transition: opacity 0.2s;
  }
  .start-btn:hover {
    opacity: 0.6;
  }
  #terminal {
    display: none;
    min-height: 100vh;
    background: var(--bg);
    padding: 14rem 2rem 3rem;
    font-family: 'Lucida Console', 'Courier New', monospace;
    font-size: 1rem;
    line-height: 1.6;
    flex-direction: column;
    align-items: center;
  }
  #term-output {
    white-space: pre-wrap;
    color: var(--text);
  }
  #term-cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.1em;
    background: var(--text);
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .term-btn {
    font: inherit;
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: opacity 0.2s;
  }
  .term-btn:hover {
    opacity: 0.6;
  }
</style>
</head>
<body>
<nav>
  <a href="#"><img src="logo.svg"></a>
  <a href="#terminal" class="start-btn" id="start-btn">&gt;Start</a>
</nav>
<div class="hero">
  <img src="hero.jpg" class="hero-img">
</div>
<section id="terminal">
  <div id="term-wrap">
    <pre id="term-output"></pre><span id="term-cursor"></span>
  </div>
</section>
<script>
  const lines = [
    '> INITIALIZING...',
    '> LOCATION: BIELEFELD, DE',
    '> OPERATOR: YEGOR DEMCHENKO',
    '',
    '> AUDIO ENGINEER',
    '> MASTERING / POST-PRODUCTION',
    '',
    '> CURRENTLY AT DD MASTERING, OBERHAUSEN',
    '',
    '> AVAILABLE FOR PROJECTS',
    '> chudooyudoo@gmail.com',
    '',
  ];

  const output = document.getElementById('term-output');
  const cursor = document.getElementById('term-cursor');

  let started = false;
  let skipped = false;
  const startBtn = document.getElementById('start-btn');

  function showFull() {
    skipped = true;
    const terminal = document.getElementById('terminal');
    terminal.style.display = 'flex';
    output.textContent = lines.join('\n');
    cursor.style.display = 'none';
    if (!output.querySelector('.term-btn')) {
      const menuSpan = document.createElement('span');
      menuSpan.innerHTML = '\n> <a href="#mastering" class="term-btn">MASTERING</a>\n> <a href="#post" class="term-btn">POST</a>\n> <a href="mailto:chudooyudoo@gmail.com" class="term-btn">CONTACT</a>';
      output.appendChild(menuSpan);
    }
  }

  document.querySelector('nav a').addEventListener('click', function(e) {
    e.preventDefault();
    if (!started) {
      started = true;
      startBtn.style.display = 'none';
    }
    showFull();
    document.getElementById('terminal').scrollIntoView({ behavior: 'smooth' });
  });

  startBtn.addEventListener('click', function(e) {
    e.preventDefault();
    if (started) return;
    started = true;
    startBtn.style.display = 'none';
    const terminal = document.getElementById('terminal');
    terminal.style.display = 'flex';
    terminal.scrollIntoView({ behavior: 'smooth' });
    setTimeout(startTyping, 400);
  });

  function startTyping() {
    let lineIndex = 0;
    let charIndex = 0;
    let text = '';
    let lastTime = 0;
    const charDelay = 35;
    const pauseDelay = 280;

    function tick(timestamp) {
      if (skipped) return;
      if (timestamp - lastTime < (lines[lineIndex] === '' ? pauseDelay : charDelay)) {
        requestAnimationFrame(tick);
        return;
      }
      lastTime = timestamp;

      if (lineIndex >= lines.length) {
        cursor.style.display = 'none';
        const menuSpan = document.createElement('span');
        menuSpan.innerHTML = '\n> <a href="#mastering" class="term-btn">MASTERING</a>\n> <a href="#post" class="term-btn">POST</a>\n> <a href="mailto:chudooyudoo@gmail.com" class="term-btn">CONTACT</a>';
        output.appendChild(menuSpan);
        return;
      }

      const line = lines[lineIndex];
      if (line === '') {
        text += '\n';
        output.textContent = text;
        lineIndex++;
        charIndex = 0;
      } else if (charIndex < line.length) {
        text += line[charIndex];
        output.textContent = text;
        charIndex++;
      } else {
        text += '\n';
        output.textContent = text;
        lineIndex++;
        charIndex = 0;
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }
</script>
</body>
</html>
