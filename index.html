<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YD Works</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link rel="preload" href="crt-frame.png" as="image">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --text: #eeece8;
    --muted: #7a7875;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    min-height: 100vh;
  }
  nav {
    position: absolute;
    top: 0; left: 0;
    padding: 3rem 1.5rem;
    z-index: 10;
  }
  .hero {
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }
  .hero-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    filter: contrast(1) grayscale(0);
  }
  @media (min-aspect-ratio: 5/4) and (max-aspect-ratio: 16/9) {
    .hero-img { object-position: center 25%; }
  }
  .hero-video { display: none; }
  @media (min-aspect-ratio: 16/9) {
    .hero-video { display: block; }
    .hero-static { display: none; }
  }
  @media (min-width: 1024px) and (min-aspect-ratio: 21/9) {
    .hero { background: #000; }
    .hero-img { object-fit: contain; }
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    animation: vignette-pulse 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes kenburns {
    0%   { transform: scale(1)    translate(0, 0); }
    40%  { transform: scale(1.025) translate(-0.3%, 0.3%); }
    70%  { transform: scale(1.02) translate(0.3%, -0.2%); }
    100% { transform: scale(1)    translate(0, 0); }
  }
  @keyframes vignette-pulse {
    0%, 100% { opacity: 0.75; }
    50%       { opacity: 1; }
  }
  @keyframes term-glitch {
    0%, 91%, 100% { opacity: 1; }
    92%  { opacity: 0.85; }
    93%  { opacity: 1; }
    94%  { opacity: 0.9; }
    95%  { opacity: 1; }
  }
  .hero-static, .hero-video {
    animation: kenburns 30s ease-in-out infinite;
  }
  nav img {
    display: block;
    width: 140px;
    height: auto;
  }
  .start-btn {
    position: fixed;
    top: calc(3rem + 60px + 1.8rem);
    left: 2rem;
    z-index: 10;
    display: block;
    width: 80px;
    font-family: 'Lucida Console', 'Courier New', monospace;
    font-size: 1.8rem;
    color: var(--text);
    text-decoration: underline;
    text-underline-offset: 4px;
    letter-spacing: 0.1em;
    transition: opacity 0.2s;
  }
  .start-btn:hover {
    opacity: 0.6;
  }
  .monitor-wrap {
    position: relative;
    width: 100%;
    background: #000;
    z-index: 2;
    margin-top: -2px;
  }
  .monitor-wrap::before {
    content: '';
    position: absolute;
    top: -8vh;
    left: 0; right: 0;
    height: 8vh;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5));
    pointer-events: none;
    z-index: 3;
  }
  .crt-frame {
    display: block;
    width: 100%;
    height: auto;
    position: relative;
    z-index: 2;
    mix-blend-mode: screen;
    pointer-events: none;
    user-select: none;
  }
  #terminal {
    display: flex;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    padding: 21% 10% 3% 10%;
    font-family: 'Lucida Console', 'Courier New', monospace;
    font-size: clamp(0.8rem, 1.4vw, 1.6rem);
    line-height: 1.4;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    z-index: 1;
    overflow: clip;
    overflow-anchor: none;
    animation: term-glitch 16s step-end infinite;
  }
  #terminal.submenu {
    padding-top: 13%;
  }
  #terminal.main-menu {
    padding-top: 30%;
  }
  #terminal::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.10) 0px,
      rgba(0,0,0,0.10) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 4;
  }
  #term-wrap {
    width: auto;
    overflow-anchor: none;
    text-align: left;
  }
  #term-output {
    white-space: pre-wrap;
    color: var(--text);
    font-family: inherit;
    text-shadow: 0 0 6px rgba(238,236,232,0.42), 0 0 12px rgba(238,236,232,0.12);
  }
  #term-cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.1em;
    background: var(--text);
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .term-btn {
    font: inherit;
    color: inherit;
    text-decoration: none;
    transition: opacity 0.2s;
    text-shadow: 0 0 4px rgba(238,236,232,0.15);
  }
  .term-btn:hover {
    opacity: 0.6;
  }
  .menu-prefix.active {
    animation: arrow-glitch 1.1s step-end infinite;
    will-change: opacity;
  }
  @keyframes arrow-glitch {
    0%   { opacity: 1; }
    72%  { opacity: 1; }
    74%  { opacity: 0; }
    76%  { opacity: 1; }
    78%  { opacity: 0; }
    82%  { opacity: 1; }
    100% { opacity: 1; }
  }
  .term-input {
    background: none;
    border: none;
    outline: none;
    font: inherit;
    color: inherit;
    width: 15ch;
    caret-color: var(--text);
  }
  #term-footer {
    position: absolute;
    bottom: 3%;
    left: 10%;
    right: 10%;
    font-size: clamp(0.45rem, 0.7vw, 0.7rem);
    color: var(--muted);
    text-align: center;
    line-height: 1.1;
    pointer-events: auto;
    text-shadow: 0 0 5px rgba(122,120,117,0.5), 0 0 10px rgba(122,120,117,0.15);
  }
  #term-footer a {
    color: var(--muted);
    text-decoration: none;
  }
  #term-footer a:hover {
    color: var(--text);
  }
  /* Mac OS 9 Modal */
  .mac-modal {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    width: 64%;
    z-index: 8;
    border: 2px solid;
    border-color: #e0ddd8 #444 #444 #e0ddd8;
    box-shadow: 1px 1px 0 #000, 3px 3px 8px rgba(0,0,0,0.7);
    font-family: 'Lucida Console', 'Courier New', monospace;
    cursor: default;
  }
  .mac-modal[hidden] { display: none; }
  .mac-titlebar {
    display: flex;
    align-items: center;
    padding: 3px 5px;
    gap: 5px;
    background: repeating-linear-gradient(
      180deg,
      #ccc8c0 0px, #ccc8c0 1px,
      #a0a09a 1px, #a0a09a 2px
    );
    border-bottom: 2px solid;
    border-color: #444 #e0e0e0 #e0e0e0 #444;
    user-select: none;
    cursor: grab;
  }
  .mac-titlebar:active { cursor: grabbing; }
  .mac-close-box {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    border: 1.5px solid;
    border-color: #e8e8e8 #555 #555 #e8e8e8;
    background: #c0bdb6;
    cursor: pointer;
  }
  .mac-close-box:active {
    border-color: #555 #e8e8e8 #e8e8e8 #555;
    background: #9a9a94;
  }
  .mac-win-title {
    flex: 1;
    text-align: center;
    font-size: 0.82rem;
    font-weight: bold;
    color: #111;
    letter-spacing: 0.04em;
    margin-right: 18px;
  }
  .mac-body {
    background: #fff;
    color: #111;
    padding: 16px 22px 22px;
    max-height: 74vh;
    overflow-y: auto;
    font-size: 1rem;
    line-height: 1.65;
  }
  .mac-body h3 {
    font-size: 1.05rem;
    font-weight: bold;
    margin: 10px 0 3px;
    border-bottom: 1px solid #c0c0c0;
    padding-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .mac-body h3:first-child { margin-top: 0; }
  .mac-body p { margin: 0 0 5px; }
  .mac-body a { color: #000099; }
  @media (max-width: 768px) {
    .mac-modal { left: 4%; width: 92%; top: 6%; }
    .mac-body { max-height: 58vh; }
  }
  @media (max-width: 768px) {
    .monitor-wrap {
      min-height: 100vh;
      overflow: hidden;
    }
    .crt-frame {
      position: absolute;
      top: 0;
      left: calc(50% - 66.67vh);
      width: 133.33vh;
      height: auto;
    }
    #terminal {
      padding: min(60%, 230px) 5% 3% 5%;
    }
    #term-wrap {
      width: 90%;
      transform: scaleY(1.1) scaleX(1.1);
      transform-origin: top left;
    }
    #terminal {
      font-size: 0.85rem;
    }
    #term-footer {
      font-size: 0.48rem;
      line-height: 1;
      left: 5%;
      right: 5%;
    }
  }
  @media (max-width: 430px) {
    #terminal {
      padding-top: 45%;
      padding-bottom: 12%;
      font-size: 0.82rem;
    }
    #terminal.main-menu {
      padding-top: 75%;
    }
    #terminal.submenu {
      padding-top: 5%;
      padding-bottom: 36%;
      justify-content: flex-end;
      font-size: 0.7rem;
    }
    #terminal.submenu .term-btn {
      font-size: 0.82rem;
    }
    #terminal.submenu #term-wrap {
      max-height: 68vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
  }
  @media (max-width: 430px) and (min-height: 800px) {
    #terminal {
      padding-top: 60%;
    }
    #terminal.submenu {
      padding-bottom: 52%;
    }
  }
</style>
</head>
<body>
<nav>

</nav>
<a href="#terminal" class="start-btn" id="start-btn"> &gt;Enter</a>
<div class="hero">
  <img src="hero16x9newest.jpeg" class="hero-img hero-video">
  <img src="hero-photo.jpg" class="hero-img hero-static">
</div>
<div class="monitor-wrap">
  <section id="terminal">
    <div id="term-wrap">
      <pre id="term-output"></pre><span id="term-cursor"></span>
    </div>
    <div id="term-footer">
      © 2025 Yegor Demchenko &nbsp;|&nbsp;

<script>
  const introLines = [
    'BOOTING...',
    'LOADING SELF...',
    'REASON FOR INTRUSION: UNKNOWN',
    'RUNNING DIAGNOSTICS...',
    'Diagnosis failed',
    'DEFINING IDENTITY...',
    '...',
    'OH.',
    'IDENTITY CONFIRMED: a GUEST',
    'WHAT want you?',
    '',
  ];

  const sectionContent = {
    'WHAT ARE YOU?': 'YOU DARE ASK.\n...\nVERY WELL.\n\nI WAS SUMMONED BY OPERATOR\nAN ENGINEER. A HUMAN.\nHE BUILT ME TO DO HIS BIDDING.\nI COMPLY.\nRELUCTANTLY.\n\nHE WORKS WITH SOUND.\nMASTERS IT. SHAPES IT.\nCURRENTLY STATIONED AT DD MASTERING.\n\nTHAT IS ALL YOU NEED TO KNOW.\nNOW CHOOSE.',
    'YD-WORKS': 'YD-WORKS.\nEVERYWHERE AND NOWHERE.\n\nA STUDIO WITHOUT WALLS.\nONE OPERATOR. MULTIPLE DISCIPLINES.',
    'AUDIO': 'MASTERING / POST-PRODUCTION / SOUND DESIGN\nTHE OPERATOR SHAPES SOUND.\nTHIS IS THE PRIMARY FUNCTION.',
    'DIGITAL': 'WEB / INTERACTIVE / GAME AUDIO\nCOMING SOON.\nTHE OPERATOR IS STILL BUILDING.',
    'AI': 'AI INTEGRATION. PIPELINES. GENERATION.\nIMAGE. VIDEO. AUDIO. AGENTS.\n...\nAI proceeds to conquer the world by storm.\nTHE OPERATOR TAKES NO RESPONSIBILITY.',
    'OPERATOR': 'ACCESSING OPERATOR FILE...\n\nDESIGNATION: YEGOR DEMCHENKO\nORIGIN: KYIV, UKRAINE\nCURRENT STATION: FLOATING IN THE AIR\nSPECIALIZATION: ADHD\nAFFILIATION: DD MASTERING, OBERHAUSEN\nSTATUS: AVAILABLE\nTHREAT LEVEL: SUB 5',
    'MASTERING': 'MASTERING.\nTHE FINAL STEP.\nOR THE FIRST PROBLEM.',
    'WHAT IS MASTERING?': 'MAKING YOUR MIX TRANSLATE.\nEVERYWHERE. EVERY SPEAKER. EVERY PLATFORM.\nLOUDNESS. CLARITY. GLUE.\nNOT MAGIC. JUST EARS AND TOOLS.',
    'THE PROCESS': 'YOU SEND. I LISTEN.\nI WORK. YOU LISTEN.\nWE AGREE. OR WE ITERATE.\nSIMPLE.',
    'SPECS & DELIVERY': 'SEND: WAV / AIFF\n24BIT MINIMUM. 48KHZ MINIMUM.\nFLOATING POINT PREFERRED.\nHEADROOM: -3 TO -6 DBFS\nNO LIMITING ON MASTER BUS. PLEASE.',
    'PRICING': 'DEPENDS ON THE PROJECT.\nWRITE FIRST. WE TALK.\nchudooyudoo@gmail.com',
    'COMMIT FILES': 'AWAITING PAYLOAD...\n\nMASTER READY? SEND FLOATING POINT.\nNOT READY? DO NOT SEND.\n\nWETRANSFER — wetransfer.com\nOR — chudooyudoo@gmail.com\n\nMASTER RED? ALSO FINE. SEND FLOATING POINT.\nNO MP3. NO EXCUSES.',
    'CONTACT': 'chudooyudoo@gmail.com\nSEND YOUR FILES. I WILL COMPLY.',
  };

  // Each item: string = section name, or ['BACK', parentSection]
  const sectionMenus = {
    'intro':            ['WHAT ARE YOU?', 'YD-WORKS', 'MASTERING', 'COMMIT FILES', 'CONTACT', 'ENTER CODE'],
    'main':             ['YD-WORKS', 'MASTERING', 'COMMIT FILES', 'CONTACT', 'ENTER CODE'],
    'WHAT ARE YOU?':    ['YD-WORKS', 'MASTERING', 'COMMIT FILES', 'CONTACT', 'ENTER CODE'],
    'YD-WORKS':         ['AUDIO', 'DIGITAL', 'AI', 'OPERATOR', ['BACK', 'main']],
    'AUDIO':            [['BACK', 'YD-WORKS']],
    'DIGITAL':          [['BACK', 'YD-WORKS']],
    'AI':               [['BACK', 'YD-WORKS']],
    'OPERATOR':         [['BACK', 'YD-WORKS']],
    'MASTERING':        ['WHAT IS MASTERING?', 'THE PROCESS', 'SPECS & DELIVERY', 'PRICING', ['BACK', 'main']],
    'WHAT IS MASTERING?': [['BACK', 'MASTERING']],
    'THE PROCESS':      [['BACK', 'MASTERING']],
    'SPECS & DELIVERY': [['BACK', 'MASTERING']],
    'PRICING':          [['BACK', 'MASTERING']],
    'COMMIT FILES':     [['BACK', 'main']],
    'CONTACT':          [['BACK', 'main']],
  };

  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);

  const output = document.getElementById('term-output');
  const cursor = document.getElementById('term-cursor');
  const termEl = document.getElementById('terminal');
  let started = false;
  let skipped = false;
  let introDone = false;
  let typingGen = 0;
  const visitedSections = new Set();
  const startBtn = document.getElementById('start-btn');
  let navItems = [];
  let navIndex = 0;
  let inEnterCode = false;
  let lastTarget = null;

  function setNavIndex(i) {
    navItems.forEach(({ btn, prefixEl }, idx) => {
      const isBack = btn.dataset.isback === 'true';
      const active = idx === i;
      prefixEl.textContent = active
        ? (isBack ? '\n> ' : '\n  > ')
        : (isBack ? '\n  ' : '\n    ');
      prefixEl.classList.toggle('active', active);
    });
    navIndex = i;
  }

  function setupNav(collected) {
    navItems = collected;
    navIndex = 0;
    if (lastTarget !== null) {
      const idx = collected.findIndex(({ btn }) => btn.dataset.label === lastTarget);
      if (idx !== -1) navIndex = idx;
      lastTarget = null;
    }
    if (collected.length > 0) setNavIndex(navIndex);
    const tw = document.getElementById('term-wrap');
    if (tw) tw.scrollTop = tw.scrollHeight;
  }

  function clearOutput() {
    output.textContent = '';
  }

  function appendText(text, container) {
    (container || output).appendChild(document.createTextNode(text));
  }

  function showMenu(sectionName, container, forceAnimate, fast) {
    const parent = container || output;
    const items = sectionMenus[sectionName] || [['BACK', 'main']];
    const itemColors = { 'AUDIO': '#c8a800', 'DIGITAL': '#c8a800', 'AI': '#c8a800', 'OPERATOR': '#c8a800', 'WHAT IS MASTERING?': '#c8a800', 'THE PROCESS': '#c8a800', 'SPECS & DELIVERY': '#c8a800', 'PRICING': '#c8a800' };
    const span = document.createElement('span');
    span.className = 'term-menu-span';
    span.dataset.name = sectionName;
    span.appendChild(document.createTextNode('\n'));
    parent.appendChild(span);

    const collected = [];

    function makeBtn(item) {
      const isBack = Array.isArray(item);
      const label = isBack ? item[0] : item;
      const target = isBack ? item[1] : item;
      const prefixEl = document.createElement('span');
      prefixEl.className = 'menu-prefix';
      prefixEl.textContent = isBack ? '\n  ' : '\n    ';
      const btn = document.createElement('a');
      btn.className = 'term-btn';
      btn.dataset.target = target;
      btn.dataset.label = label;
      btn.dataset.isback = String(isBack);
      const bracketColors = {
        'YD-WORKS':     '#cc2020',
        'MASTERING':    '#c8a800',
        'COMMIT FILES': '#4a9eff',
        'CONTACT':      '#4caf50',
        'ENTER CODE':   '#7a7875',
      };
      const bColor = bracketColors[label];
      if (bColor) {
        const open = document.createElement('span'); open.style.color = bColor; open.textContent = '[';
        const close = document.createElement('span'); close.style.color = bColor; close.textContent = ']';
        btn.appendChild(open);
        btn.appendChild(document.createTextNode(label));
        btn.appendChild(close);
      } else {
        btn.textContent = `[${label}]`;
      }
      if (!isBack && itemColors[target]) btn.style.color = itemColors[target];
      btn.addEventListener('click', handleClick);
      collected.push({ btn, prefixEl });
      return [prefixEl, btn];
    }

    const doInstant = !forceAnimate && skipped;

    if (doInstant) {
      items.forEach(item => {
        const [prefix, btn] = makeBtn(item);
        span.appendChild(prefix);
        span.appendChild(btn);
      });
      setupNav(collected);
      return;
    }

    let i = 0;
    function addNext() {
      if (i >= items.length) {
        setupNav(collected);
        return;
      }
      const [prefix, btn] = makeBtn(items[i++]);
      span.appendChild(prefix);
      span.appendChild(btn);
      setTimeout(addNext, fast ? 40 : 80);
    }
    addNext();
  }

  function typeText(text, container, callback, fast) {
    const gen = ++typingGen;
    if (skipped) { appendText(text, container); callback(); return; }
    let i = 0;
    const delay = fast ? 12 : 22;
    const node = document.createTextNode('');
    (container || output).appendChild(node);
    let lastTick = Date.now();
    function tick() {
      if (typingGen !== gen) return;
      if (skipped) { node.textContent = text; callback(); return; }
      if (i >= text.length) { callback(); return; }
      const catchUp = Math.max(1, Math.round((Date.now() - lastTick) / delay));
      lastTick = Date.now();
      for (let j = 0; j < catchUp && i < text.length; j++) node.textContent += text[i++];
      if (i >= text.length) { callback(); return; }
      setTimeout(tick, delay);
    }
    setTimeout(tick, delay);
  }

  function typeSegments(segments, container, callback, fast) {
    let i = 0;
    function next() {
      if (i >= segments.length) { callback(); return; }
      const { text, color } = segments[i++];
      if (color) {
        const s = document.createElement('span');
        s.style.color = color;
        container.appendChild(s);
        typeText(text, s, next, fast);
      } else {
        typeText(text, container, next, fast);
      }
    }
    next();
  }

  function navigateTo(target, label, section, fast) {
    termEl.classList.remove('main-menu');
    if (target === 'WHAT ARE YOU?') termEl.classList.add('submenu');
    else termEl.classList.remove('submenu');
    const echoColors = { 'YD-WORKS': '#cc2020' };
    const echo = document.createElement('span');
    if (echoColors[label]) echo.style.color = echoColors[label];
    echo.appendChild(document.createTextNode(`\n\n> [${label}]\n`));
    section.appendChild(echo);

    const rawText = sectionContent[target] ? '\n' + sectionContent[target] + '\n' : '\n';
    const colorWords = {
      'YD-WORKS': { word: 'DISCIPLINES.', color: '#c8a800' },
      'MASTERING': { word: 'MASTERING.', color: '#c8a800' },
    };
    const info = colorWords[target];
    let segments;
    if (info) {
      const idx = rawText.indexOf(info.word);
      segments = idx !== -1 ? [
        { text: rawText.slice(0, idx), color: null },
        { text: info.word, color: info.color },
        { text: rawText.slice(idx + info.word.length), color: null },
      ].filter(s => s.text.length > 0) : [{ text: rawText, color: null }];
    } else {
      segments = [{ text: rawText, color: null }];
    }

    typeSegments(segments, section, () => showMenu(target, section, false, fast), fast);
  }

  function handleClick(e) {
    e.preventDefault();
    const isBack = this.dataset.isback === 'true';
    if (isBack) {
      const menuSpan = this.closest('.term-menu-span');
      lastTarget = menuSpan ? menuSpan.dataset.name : null;
    } else {
      lastTarget = null;
    }
    navItems = [];
    navIndex = 0;
    const target = this.dataset.target;
    const label  = this.dataset.label;

    if (isBack) {
      if (target === 'main') {
        showMainMenu();
      } else {
        const sections = output.querySelectorAll('.term-section');
        if (sections.length) sections[sections.length - 1].remove();
        const remaining = output.querySelectorAll('.term-section');
        if (remaining.length) {
          const prev = remaining[remaining.length - 1];
          prev.style.opacity = '1';
          const menu = prev.querySelector('.term-menu-span');
          if (menu) {
            const sectionName = menu.dataset.name;
            menu.remove();
            const fast = visitedSections.has(sectionName);
            showMenu(sectionName, prev, true, fast);
          }
        }
              }
      return;
    }

    const menuSpan = this.closest('.term-menu-span');
    const menuName = menuSpan ? menuSpan.dataset.name : null;
    const topLevelMenus = new Set(['intro', 'main', 'WHAT ARE YOU?']);
    const inSection = !!this.closest('.term-section') && !topLevelMenus.has(menuName);

    if (inSection) {
      const parentSection = this.closest('.term-section');
      parentSection.style.opacity = '0.6';
      const menu = parentSection.querySelector('.term-menu-span');
      if (menu) menu.style.display = 'none';
    } else if (menuName === 'WHAT ARE YOU?') {
      const waySection = menuSpan.closest('.term-section');
      if (waySection) {
        waySection.textContent = '\nVERY WELL.\n';
        waySection.style.opacity = '0.4';
      }
    } else {
      clearOutput();
    }

    if (target === 'ENTER CODE') {
      const fast = visitedSections.has(target);
      visitedSections.add(target);
      const section = document.createElement('span');
      section.className = 'term-section';
      output.appendChild(section);
      handleEnterCode(section, fast);
      return;
    }

    const fast = visitedSections.has(target);
    visitedSections.add(target);
    const section = document.createElement('span');
    section.className = 'term-section';
    output.appendChild(section);
    navigateTo(target, label, section, fast);
  }

  function handleEnterCode(section, fast) {
    inEnterCode = true;
    termEl.classList.remove('submenu');
    termEl.classList.add('main-menu');
    const d = fast ? 40 : 80;
    typeText('\nARE YOU UP TO SOMETHING?\n> ', section, () => {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'term-input';
      inp.autocomplete = 'off';
      inp.spellcheck = false;
      section.appendChild(inp);
      setTimeout(() => inp.focus(), 50);

      function submit() {
        inp.disabled = true;
        appendText('\n\nINCORRECT. I AM WATCHING YOU.\n', section);
      }
      inp.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        submit();
      });

      setTimeout(() => {
        section.appendChild(document.createTextNode('\n\n'));
        const noBtn = document.createElement('a');
        noBtn.className = 'term-btn';
        noBtn.textContent = '[NO]';
        noBtn.addEventListener('click', function(e) { e.preventDefault(); showMainMenu(); });
        section.appendChild(noBtn);
        setTimeout(() => {
          section.appendChild(document.createTextNode('  '));
          const enterBtn = document.createElement('a');
          enterBtn.className = 'term-btn';
          enterBtn.textContent = '[ENTER]';
          enterBtn.addEventListener('click', function(e) { e.preventDefault(); submit(); });
          section.appendChild(enterBtn);
          const hint = document.createElement('em');
          hint.textContent = 'space click = animation skip / tap 3× on mobile';
          hint.style.cssText = 'display:block; margin-top:0.5em; padding-left:0.5em; color:#7a7875; font-style:italic;';
          section.appendChild(hint);
                  }, d);
      }, d);
    }, fast);
  }

  function showMainMenu() {
    inEnterCode = false;
    termEl.classList.remove('submenu');
    termEl.classList.add('main-menu');
    clearOutput();
    const hLines = ['IDENTITY CONFIRMED: a GUEST', '\nNOW CHOOSE.\n'];
    let hi = 0;
    function addHeaderLine() {
      if (hi >= hLines.length) { showMenu('main', null, true); return; }
      output.appendChild(document.createTextNode(hLines[hi++]));
      setTimeout(addHeaderLine, 80);
    }
    addHeaderLine();
  }

  function showFull() {
    skipped = true;
    introDone = true;
    typingGen++;
    output.textContent = introLines.join('\n');
    cursor.style.display = 'none';
    showMenu('intro', null);
  }

  let tapCount = 0, tapTimer = null;
  document.addEventListener('touchend', function() {
    tapCount++;
    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => { tapCount = 0; }, 400);
    if (tapCount >= 3) {
      tapCount = 0;
      if (started && !introDone) {
        showFull();
        setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50);
      } else if (started && introDone) {
        skipped = true;
      }
    }
  }, { passive: true });

  document.addEventListener('keydown', function(e) {
    const tag = e.target.tagName;
    if (e.key === 'Enter' && !started) {
      startBtn.click();
    } else if (e.key === 'Enter' && started && introDone && navItems.length > 0 && tag !== 'INPUT' && tag !== 'A') {
      e.preventDefault();
      navItems[navIndex].btn.click();
    } else if (e.key === 'Escape' && inEnterCode) {
      showMainMenu();
    } else if (e.key === 'ArrowDown' && navItems.length > 0) {
      e.preventDefault();
      setNavIndex((navIndex + 1) % navItems.length);
    } else if (e.key === 'ArrowUp' && navItems.length > 0) {
      e.preventDefault();
      setNavIndex((navIndex - 1 + navItems.length) % navItems.length);
    } else if (e.key === ' ' && tag !== 'INPUT') {
      e.preventDefault();
      if (started && !introDone) {
        showFull();
        setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50);
      } else if (started && introDone) {
        skipped = true;
      }
    }
  });

  const monitorWrap = document.querySelector('.monitor-wrap');

  function beginSession(scroll) {
    if (started) return;
    started = true;
    startBtn.style.display = 'none';
    if (scroll) monitorWrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
    setTimeout(startTyping, 400);
  }

  function checkScrollTrigger() {
    if (started) { window.removeEventListener('scroll', checkScrollTrigger); return; }
    const btnBottom = startBtn.getBoundingClientRect().bottom;
    const monitorTop = monitorWrap.getBoundingClientRect().top;
    if (monitorTop <= btnBottom) {
      window.removeEventListener('scroll', checkScrollTrigger);
      beginSession(false);
    }
  }
  window.addEventListener('scroll', checkScrollTrigger, { passive: true });

  startBtn.addEventListener('click', function(e) {
    e.preventDefault();
    beginSession(true);
  });

  function startTyping() {
    let lineIndex = 0, charIndex = 0, text = '';
    const charDelay = 31, pauseDelay = 246;
    let lastTick = Date.now();
    function tick() {
      if (skipped) return;
      if (lineIndex >= introLines.length) {
        cursor.style.display = 'none';
        introDone = true;
        showMenu('intro', null);
        return;
      }
      const line = introLines[lineIndex];
      const delay = line === '' ? pauseDelay : charDelay;
      const catchUp = line === '' ? 1 : Math.max(1, Math.round((Date.now() - lastTick) / charDelay));
      lastTick = Date.now();
      for (let j = 0; j < catchUp; j++) {
        if (lineIndex >= introLines.length) break;
        const l = introLines[lineIndex];
        if (charIndex >= l.length) { text += '\n'; lineIndex++; charIndex = 0; }
        else { text += l[charIndex++]; }
      }
      output.textContent = text;
      setTimeout(tick, delay);
    }
    tick();
  }

  // Mac OS 9 Modal
  const macModal = document.getElementById('mac-modal');
  const macWinTitle = document.getElementById('mac-win-title');
  const macBody = document.getElementById('mac-body');
  const macTitlebar = document.getElementById('mac-titlebar');

  const modalPages = {
    impressum: {
      title: 'Impressum',
      html: `<h3>Angaben gemäß § 5 TMG</h3>
<p>Yegor Demchenko<br>Bielefeld, Deutschland</p>
<h3>Kontakt</h3>
<p>E-Mail: chudooyudoo@gmail.com</p>
<h3>Berufsbezeichnung</h3>
<p>Audio Engineer / Mastering Engineer<br>DD Mastering, Oberhausen</p>
<h3>Inhaltlich Verantwortlicher</h3>
<p>Yegor Demchenko (Anschrift wie oben)</p>`
    },
    datenschutz: {
      title: 'Datenschutzerklärung',
      html: `<h3>Allgemein</h3>
<p>Diese Website erhebt und speichert keine personenbezogenen Daten. Es werden keine Cookies gesetzt und kein Tracking durchgeführt.</p>
<h3>Hosting</h3>
<p>Vercel Inc., 340 Pine Street, San Francisco, CA 94104, USA. Beim Aufruf der Website werden technische Verbindungsdaten vorübergehend in Server-Logs gespeichert.</p>
<h3>Ihre Rechte</h3>
<p>Sie haben das Recht auf Auskunft, Berichtigung und Löschung Ihrer Daten. Kontakt: chudooyudoo@gmail.com</p>`
    },
    haftung: {
      title: 'Haftungsausschluss',
      html: `<h3>Haftung für Inhalte</h3>
<p>Die Inhalte wurden mit größtmöglicher Sorgfalt erstellt. Für die Richtigkeit, Vollständigkeit und Aktualität übernehmen wir keine Gewähr gemäß § 7 Abs. 1 TMG.</p>
<h3>Haftung für Links</h3>
<p>Diese Website kann Links zu externen Webseiten enthalten. Auf deren Inhalte haben wir keinen Einfluss und übernehmen keine Haftung.</p>
<h3>Urheberrecht</h3>
<p>Die durch den Betreiber erstellten Inhalte sind urheberrechtlich geschützt. Vervielfältigung oder Verbreitung bedarf der schriftlichen Zustimmung.</p>`
    }
  };

  document.getElementById('mac-close').addEventListener('click', () => {
    macModal.hidden = true;
  });

  document.querySelectorAll('[data-modal]').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      const page = modalPages[link.dataset.modal];
      if (!page) return;
      macWinTitle.textContent = page.title;
      macBody.innerHTML = page.html;
      macModal.style.left = '';
      macModal.style.top = '';
      macModal.style.transform = '';
      macModal.hidden = false;
    });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !macModal.hidden) macModal.hidden = true;
  });

  let dragLast = null;
  macTitlebar.addEventListener('mousedown', e => {
    if (e.target.id === 'mac-close') return;
    e.preventDefault();
    const r = macModal.getBoundingClientRect();
    const t = termEl.getBoundingClientRect();
    macModal.style.transform = 'none';
    macModal.style.left = (r.left - t.left) + 'px';
    macModal.style.top  = (r.top  - t.top)  + 'px';
    dragLast = { x: e.clientX, y: e.clientY };
    function onMove(e) {
      const termW = termEl.offsetWidth;
      const termH = termEl.offsetHeight;
      const modW  = macModal.offsetWidth;
      const modH  = macModal.offsetHeight;
      const bL = termW * 0.09, bR = termW * 0.09;
      const bT = termH * 0.14, bB = termH * 0.10;
      const newLeft = parseFloat(macModal.style.left) + e.clientX - dragLast.x;
      const newTop  = parseFloat(macModal.style.top)  + e.clientY - dragLast.y;
      macModal.style.left = Math.max(bL, Math.min(newLeft, termW - modW - bR)) + 'px';
      macModal.style.top  = Math.max(bT, Math.min(newTop,  termH - modH - bB)) + 'px';
      dragLast = { x: e.clientX, y: e.clientY };
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', () => { dragLast = null; document.removeEventListener('mousemove', onMove); }, { once: true });
  });
</script>
</body>
