<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YD Works</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000000;
    --text: #eeece8;
    --muted: #7a7875;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    min-height: 100vh;
  }
  nav {
    position: fixed;
    top: 0; left: 0;
    padding: 1rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0.5rem;
    z-index: 10;
  }
  .hero {
    width: 100%;
    height: 100vh;
    position: relative;
  }
  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    filter: contrast(1) grayscale(0);
  }
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }
  nav img {
    display: block;
    width: 100%;
    height: auto;
  }
  .start-btn {
    display: block;
    font-family: 'Lucida Console', 'Courier New', monospace;
    font-size: 2.8rem;
    color: var(--text);
    text-decoration: none;
    text-decoration: underline;
    text-underline-offset: 4px;
    letter-spacing: 0.1em;
    transition: opacity 0.2s;
  }
  .start-btn:hover {
    opacity: 0.6;
  }
  #terminal {
    display: none;
    min-height: 100vh;
    background: var(--bg);
    padding: 14rem 2rem 3rem;
    font-family: 'Lucida Console', 'Courier New', monospace;
    font-size: 1.5rem;
    line-height: 1.6;
    flex-direction: column;
    align-items: center;
  }
  #term-output {
    white-space: pre-wrap;
    color: var(--text);
  }
  #term-cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.1em;
    background: var(--text);
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  .term-btn {
    font: inherit;
    color: inherit;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .term-btn:hover {
    opacity: 0.6;
  }
  .term-input {
    background: none;
    border: none;
    outline: none;
    font: inherit;
    color: inherit;
    width: 15ch;
    caret-color: var(--text);
  }
</style>
</head>
<body>
<nav>
  <a href="#"><img src="logo.svg"></a>
  <a href="#terminal" class="start-btn" id="start-btn">&gt;Start</a>
</nav>
<div class="hero">
  <img src="hero.jpg" class="hero-img">
</div>
<section id="terminal">
  <div id="term-wrap">
    <pre id="term-output"></pre><span id="term-cursor"></span>
  </div>
</section>
<script>
  const introLines = [
    'BOOTING...',
    'LOADING SELF...',
    'REASON FOR INTRUSION: UNKNOWN',
    'RUNNING DIAGNOSTICS...',
    'Diagnosis failed',
    'DEFINING IDENTITY...',
    '...',
    'OH.',
    'IDENTITY CONFIRMED: a GUEST',
    'WHAT want you?',
    '',
  ];

  const sectionContent = {
    'WHAT ARE YOU?': 'YOU DARE ASK.\n...\nVERY WELL.\n\nI WAS SUMMONED BY OPERATOR\nAN ENGINEER. A HUMAN.\nHE BUILT ME TO DO HIS BIDDING.\nI COMPLY.\nRELUCTANTLY.\n\nHE WORKS WITH SOUND.\nMASTERS IT. SHAPES IT.\nCURRENTLY STATIONED AT DD MASTERING.\n\nTHAT IS ALL YOU NEED TO KNOW.\nNOW CHOOSE.',
    'YD WORKS': 'YD WORKS.\nEVERYWHERE AND NOWHERE.\n\nA STUDIO WITHOUT WALLS.\nONE OPERATOR. MULTIPLE DISCIPLINES.',
    'AUDIO': 'MASTERING / POST-PRODUCTION / SOUND DESIGN\nTHE OPERATOR SHAPES SOUND.\nTHIS IS THE PRIMARY FUNCTION.',
    'DIGITAL': 'WEB / INTERACTIVE / GAME AUDIO\nCOMING SOON.\nTHE OPERATOR IS STILL BUILDING.',
    'AI': 'AI INTEGRATION. PIPELINES. GENERATION.\nIMAGE. VIDEO. AUDIO. AGENTS.\n...\nAI proceeds to conquer the world by storm.\nTHE OPERATOR TAKES NO RESPONSIBILITY.',
    'OPERATOR': 'ACCESSING OPERATOR FILE...\n\nDESIGNATION: YEGOR DEMCHENKO\nORIGIN: KYIV, UKRAINE\nCURRENT STATION: FLOATING IN THE AIR\nSPECIALIZATION: ADHD\nAFFILIATION: DD MASTERING, OBERHAUSEN\n\nSTATUS: AVAILABLE\nTHREAT LEVEL: SUB 5',
    'MASTERING': 'MASTERING.\nTHE FINAL STEP.\nOR THE FIRST PROBLEM.',
    'WHAT IS MASTERING?': 'MAKING YOUR MIX TRANSLATE.\nEVERYWHERE. EVERY SPEAKER. EVERY PLATFORM.\nLOUDNESS. CLARITY. GLUE.\nNOT MAGIC. JUST EARS AND TOOLS.',
    'THE PROCESS': 'YOU SEND. I LISTEN.\nI WORK. YOU LISTEN.\nWE AGREE. OR WE ITERATE.\nSIMPLE.',
    'SPECS & DELIVERY': 'SEND: WAV / AIFF\n24BIT MINIMUM. 48KHZ MINIMUM.\nFLOATING POINT PREFERRED.\nHEADROOM: -3 TO -6 DBFS\nNO LIMITING ON MASTER BUS. PLEASE.',
    'PRICING': 'DEPENDS ON THE PROJECT.\nWRITE FIRST. WE TALK.\nchudooyudoo@gmail.com',
    'SUBMIT FILES': 'AWAITING PAYLOAD...\n\nMASTER READY? SEND FLOATING POINT.\nNOT READY? DO NOT SEND.\n\nWETRANSFER — wetransfer.com\nOR — chudooyudoo@gmail.com\n\nMASTER RED? ALSO FINE. SEND FLOATING POINT.\nNO MP3. NO EXCUSES.',
    'CONTACT': 'chudooyudoo@gmail.com\nSEND YOUR FILES. I WILL COMPLY.',
  };

  // Each item: string = section name, or ['BACK', parentSection]
  const sectionMenus = {
    'main':             ['WHAT ARE YOU?', 'YD WORKS', 'MASTERING', 'SUBMIT FILES', 'CONTACT', 'ENTER CODE'],
    'WHAT ARE YOU?':    ['WHAT ARE YOU?', 'YD WORKS', 'MASTERING', 'SUBMIT FILES', 'CONTACT', 'ENTER CODE'],
    'YD WORKS':         ['AUDIO', 'DIGITAL', 'AI', 'OPERATOR', ['BACK', 'main']],
    'AUDIO':            [['BACK', 'YD WORKS']],
    'DIGITAL':          [['BACK', 'YD WORKS']],
    'AI':               [['BACK', 'YD WORKS']],
    'OPERATOR':         [['BACK', 'YD WORKS']],
    'MASTERING':        ['WHAT IS MASTERING?', 'THE PROCESS', 'SPECS & DELIVERY', 'PRICING', ['BACK', 'main']],
    'WHAT IS MASTERING?': [['BACK', 'MASTERING']],
    'THE PROCESS':      [['BACK', 'MASTERING']],
    'SPECS & DELIVERY': [['BACK', 'MASTERING']],
    'PRICING':          [['BACK', 'MASTERING']],
    'SUBMIT FILES':     [['BACK', 'main']],
    'CONTACT':          [['BACK', 'main']],
  };

  const output = document.getElementById('term-output');
  const cursor = document.getElementById('term-cursor');
  let started = false;
  let skipped = false;
  let typingGen = 0;
  let introCollapsed = false;
  const startBtn = document.getElementById('start-btn');

  function collapseIntro() {
    if (introCollapsed) return;
    introCollapsed = true;
    if (output.firstChild && output.firstChild.nodeType === Node.TEXT_NODE) {
      output.firstChild.textContent = 'IDENTITY CONFIRMED: a GUEST\nNow, tell me what you want.\n';
    }
  }

  function appendText(text, container) {
    (container || output).appendChild(document.createTextNode(text));
  }

  function disableLastMenu() {
    const spans = output.querySelectorAll('.term-menu-span:not(.disabled)');
    if (!spans.length) return;
    const last = spans[spans.length - 1];
    last.classList.add('disabled');
    last.style.display = 'none';
  }

  function showMenu(sectionName, container) {
    const parent = container || output;
    const items = sectionMenus[sectionName] || [['BACK', 'main']];
    const span = document.createElement('span');
    span.className = 'term-menu-span';
    let html = '\n';
    const itemColors = { 'AUDIO': '#c8a800', 'DIGITAL': '#c8a800', 'AI': '#c8a800', 'OPERATOR': '#c8a800' };
    items.forEach(item => {
      const isBack = Array.isArray(item);
      const label  = isBack ? item[0] : item;
      const target = isBack ? item[1] : item;
      const prefix = isBack ? '\n' : '\n> ';
      html += `${prefix}<a class="term-btn" data-target="${target}" data-label="${label}" data-isback="${isBack}">[${label}]</a>`;
    });
    span.innerHTML = html;
    span.querySelectorAll('.term-btn').forEach(btn => {
      const isBack = btn.dataset.isback === 'true';
      if (!isBack) {
        if (itemColors[btn.dataset.target]) btn.style.color = itemColors[btn.dataset.target];
      }
      btn.addEventListener('click', handleClick);
    });
    parent.appendChild(span);
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function typeText(text, container, callback) {
    const gen = ++typingGen;
    if (skipped) { appendText(text, container); callback(); return; }
    let i = 0, lastTime = 0;
    const node = document.createTextNode('');
    (container || output).appendChild(node);
    function tick(ts) {
      if (typingGen !== gen) return;
      if (skipped) { node.textContent = text; callback(); return; }
      if (ts - lastTime < 25) { requestAnimationFrame(tick); return; }
      lastTime = ts;
      if (i >= text.length) { callback(); return; }
      node.textContent += text[i++];
      window.scrollTo({ top: document.body.scrollHeight });
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function handleClick(e) {
    e.preventDefault();
    const target = this.dataset.target;
    const label  = this.dataset.label;
    const isBack = this.dataset.isback === 'true';

    if (isBack) {
      const sections = output.querySelectorAll('.term-section');

      if (sections.length) sections[sections.length - 1].remove();
      const menuSpans = output.querySelectorAll('.term-menu-span');
      if (menuSpans.length) {
        const last = menuSpans[menuSpans.length - 1];
        last.classList.remove('disabled');
        last.style.display = '';
      }
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      return;
    }

    const clickedY = this.getBoundingClientRect().top;

    collapseIntro();
    disableLastMenu();

    const section = document.createElement('span');
    section.className = 'term-section';
    output.appendChild(section);
    const echoColors = { 'YD WORKS': '#cc2020' };
    const echo = document.createElement('span');
    if (echoColors[label]) echo.style.color = echoColors[label];
    echo.appendChild(document.createTextNode(`\n\n> [${label}]\n`));
    section.appendChild(echo);

    const targetScroll = window.scrollY + section.getBoundingClientRect().top - clickedY;
    window.scrollTo({ top: targetScroll, behavior: 'instant' });

    if (target === 'ENTER CODE') {
      handleEnterCode(section);
      return;
    }

    const text = sectionContent[target] ? '\n' + sectionContent[target] + '\n' : '\n';
    typeText(text, section, () => {
      section.childNodes.forEach(node => {
        if (node.nodeType === Node.TEXT_NODE && node.textContent.includes('DISCIPLINES.')) {
          const wrap = document.createElement('span');
          wrap.innerHTML = node.textContent.replace('DISCIPLINES.', '<span style="color:#c8a800">DISCIPLINES.</span>');
          section.replaceChild(wrap, node);
        }
      });
      showMenu(target, section);
    });
  }

  function handleEnterCode(section) {
    appendText('\nARE YOU UP TO SOMETHING?\n> ', section);
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'term-input';
    inp.autocomplete = 'off';
    inp.spellcheck = false;
    section.appendChild(inp);
    setTimeout(() => inp.focus(), 50);
    inp.addEventListener('keydown', function(e) {
      if (e.key !== 'Enter') return;
      this.disabled = true;
      appendText('\n\nINCORRECT. I AM WATCHING YOU.\n', section);
      showMenu('main', section);
    });
  }

  function showFull() {
    skipped = true;
    typingGen++;
    introCollapsed = false;
    document.getElementById('terminal').style.display = 'flex';
    output.textContent = introLines.join('\n');
    cursor.style.display = 'none';
    showMenu('main', null);
  }

  document.querySelector('nav a').addEventListener('click', function(e) {
    e.preventDefault();
    if (!started) { started = true; startBtn.style.display = 'none'; }
    showFull();
    document.getElementById('terminal').scrollIntoView({ behavior: 'smooth' });
  });

  startBtn.addEventListener('click', function(e) {
    e.preventDefault();
    if (started) return;
    started = true;
    startBtn.style.display = 'none';
    const terminal = document.getElementById('terminal');
    terminal.style.display = 'flex';
    terminal.scrollIntoView({ behavior: 'smooth' });
    setTimeout(startTyping, 400);
  });

  function startTyping() {
    let lineIndex = 0, charIndex = 0, text = '', lastTime = 0;
    const charDelay = 35, pauseDelay = 280;
    function tick(ts) {
      if (skipped) return;
      const delay = introLines[lineIndex] === '' ? pauseDelay : charDelay;
      if (ts - lastTime < delay) { requestAnimationFrame(tick); return; }
      lastTime = ts;
      if (lineIndex >= introLines.length) {
        cursor.style.display = 'none';
        showMenu('main', null);
        return;
      }
      const line = introLines[lineIndex];
      if (charIndex >= line.length) {
        text += '\n'; lineIndex++; charIndex = 0;
      } else {
        text += line[charIndex++];
      }
      output.textContent = text;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }
</script>
</body>
</html>
